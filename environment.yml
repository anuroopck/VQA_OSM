name: gnr_project_env
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  
  # Core ML/DL (Conda handles the CUDA mapping automatically here)
  - pytorch=2.10.0
  - torchvision=0.25.0
  - pytorch-cuda=12.8
  
  # Data & Vision
  - pandas=2.3.3
  - pillow=11.3.0
  - opencv=4.13.0
  
  # Pip packages for models and OCR
  - pip
  - pip:
      - transformers==5.0.0
      - accelerate==1.12.0
      - bitsandbytes==0.49.2
      - easyocr==1.7.2